# fly.toml — set app name to something unique before deploying
app = "dash-pallet-town"
primary_region = "ewr"

[build]

[env]
  DATA_DIR = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "pallet_data"
  destination = "/data"
